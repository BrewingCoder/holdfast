version: "2"

run:
    timeout: 5m

output:
    sort-order:
        - file

linters:
    exclusions:
        paths:
            - private-graph/graph/generated
            - public-graph/graph/generated
    enable:
        - errcheck
        - gosimple
        - govet
        - ineffassign
        - staticcheck
        - unused
        - depguard
        - exhaustruct
    settings:
        staticcheck:
            checks: ['all']
        exhaustruct:
            include:
                - 'backend/alerts'
        depguard:
            rules:
                main:
                    list-mode: lax
                    deny:
                        - pkg: 'log'
                          desc: 'logging is allowed only by github.com/sirupsen/logrus'
