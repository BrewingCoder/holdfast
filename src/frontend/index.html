			property="og:title"

			property="og:description"
			content="HoldFast gives your team full transparency into the errors, interactions, and performance metrics of your application."

		<meta property="twitter:card" content="/hero.png" />
		<meta property="twitter:url" content="/" />
		<meta
			property="twitter:title"
			content="HoldFast | The Open Source, Fullstack Monitoring Platform"
		/>
		<meta
			property="twitter:description"
			content="HoldFast gives your team full transparency into the errors, interactions, and performance metrics of your application."
		/>

		</script>
		<script type="module" src="./src/index.tsx" defer></script>
