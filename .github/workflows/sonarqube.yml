name: SonarQube

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Analysis
    runs-on: [self-hosted, holdfast]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'src/backend/go.mod'
          cache-dependency-path: 'src/backend/go.sum'

      - name: Run tests with coverage
        run: |
          cd src/backend
          go test -short -coverprofile=coverage.out -covermode=atomic \
            ./parser/... ./queryparser/... ./env/... ./assets/... \
            ./errorgroups/... ./vercel/... ./http/... ./alerts/... \
            ./pricing/...
        env:
          ENVIRONMENT: test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: src/backend
          args: >
            -Dsonar.projectKey=holdfast-backend
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,**/test-files/**,**/migrations/**
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.scm.revision=${{ github.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: src/backend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  frontend:
    name: Frontend Analysis
    runs-on: [self-hosted, holdfast]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build workspace deps
        run: |
          yarn workspace @holdfast-io/ui build
          yarn turbo run build --filter='rrweb...'
          yarn turbo run build --filter='@rrweb/*' --filter='!@rrweb/web-extension'

      - name: Run tests with coverage
        run: yarn workspace @holdfast-io/frontend test --run --coverage
        env:
          TZ: UTC

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: src/frontend
          args: >
            -Dsonar.projectKey=holdfast-frontend
            -Dsonar.sources=src
            -Dsonar.exclusions=src/graph/generated/**,src/__generated/**,src/stubs/**,**/*.test.*,**/*.spec.*
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scm.revision=${{ github.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: src/frontend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  browser:
    name: Browser SDK Analysis
    runs-on: [self-hosted, holdfast]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: sdk/highlight-run
          args: >
            -Dsonar.projectKey=holdfast-browser
            -Dsonar.sources=src
            -Dsonar.exclusions=src/graph/generated/**,src/__generated/**,**/*.test.*
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.scm.revision=${{ github.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: sdk/highlight-run/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  node:
    name: Node SDK Analysis
    runs-on: [self-hosted, holdfast]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: sdk/highlight-node
          args: >
            -Dsonar.projectKey=holdfast-node
            -Dsonar.sources=src
            -Dsonar.exclusions=**/*.test.*
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts
            -Dsonar.scm.revision=${{ github.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: sdk/highlight-node/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sdk-integrations:
    name: SDK Integrations Analysis
    runs-on: [self-hosted, holdfast]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=holdfast-sdk-integrations
            -Dsonar.sources=sdk/highlight-next/src,sdk/highlight-react/src,sdk/highlight-remix/src,sdk/highlight-cloudflare/src,sdk/highlight-apollo/src,sdk/highlight-hono/src,sdk/highlight-nest/src,sdk/pino/src
            -Dsonar.exclusions=**/*.test.*,**/node_modules/**
            -Dsonar.tests=sdk/highlight-next/src,sdk/highlight-apollo/src
            -Dsonar.test.inclusions=**/*.test.ts
            -Dsonar.scm.revision=${{ github.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  infra:
    name: Infrastructure Analysis
    runs-on: [self-hosted, holdfast]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=holdfast-infra
            -Dsonar.sources=infra
            -Dsonar.exclusions=**/node_modules/**
            -Dsonar.scm.revision=${{ github.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
