name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - 'packages/ui/**'
      - 'yarn.lock'
  pull_request:
    paths:
      - 'src/frontend/**'
      - 'packages/ui/**'
      - 'yarn.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: [self-hosted, Linux, holdfast]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          # cache handled by self-hosted runner

      - name: Install dependencies
        run: yarn install --immutable
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build workspace deps
        run: |
          yarn workspace @holdfast-io/ui build
          yarn turbo run build --filter='rrweb...'
          yarn turbo run build --filter='@rrweb/*' --filter='!@rrweb/web-extension'

      - name: TypeScript check
        run: yarn workspace @holdfast-io/frontend types:check

      - name: Lint
        run: yarn workspace @holdfast-io/frontend lint

      - name: Test with coverage
        run: yarn workspace @holdfast-io/frontend test:coverage
        env:
          TZ: UTC

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: src/frontend/coverage/
