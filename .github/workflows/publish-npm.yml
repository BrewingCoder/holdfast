name: Publish — NPM

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Which tier to publish (1-4 or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - 'all'
      dry-run:
        description: 'Dry run (no actual publish)'
        required: true
        default: true
        type: boolean
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build all SDKs
    runs-on: [self-hosted, Linux, holdfast]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build rrweb (core + all plugins)
        run: |
          yarn turbo run build --filter='rrweb...'
          yarn turbo run build --filter='@rrweb/*' --filter='!@rrweb/web-extension'

      - name: Build all SDKs (tier order)
        run: |
          # Tier 1 — leaf packages
          yarn workspace @holdfast-io/browser build
          yarn workspace @holdfast-io/cloudflare build
          yarn workspace @holdfast-io/sourcemap-uploader build
          yarn workspace @holdfast-io/node build
          yarn workspace @holdfast-io/react build
          yarn workspace @holdfast-io/apollo build
          yarn workspace @holdfast-io/hono build
          yarn workspace @holdfast-io/nest build
          yarn workspace @holdfast-io/pino build
          yarn workspace @holdfast-io/remix build
          yarn workspace @holdfast-io/next build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdk-dist
          path: |
            sdk/*/dist/
            sdk/*/lib/
            sdk/*/es/
            sdk/*/typings/
            packages/sourcemap-uploader/dist/

  publish-tier-1:
    name: 'Tier 1: Leaf packages'
    needs: build
    if: inputs.tier == '1' || inputs.tier == 'all'
    runs-on: [self-hosted, Linux, holdfast]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: Set versions
        run: |
          for pkg in sdk/highlight-run sdk/highlight-cloudflare packages/sourcemap-uploader; do
            node -e "const f='$pkg/package.json'; const p=JSON.parse(require('fs').readFileSync(f)); p.version='${{ inputs.version }}'; require('fs').writeFileSync(f, JSON.stringify(p, null, '\t')+'\n')"
          done

      - name: Publish @holdfast-io/browser
        working-directory: sdk/highlight-run
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/cloudflare
        working-directory: sdk/highlight-cloudflare
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/sourcemap-uploader
        working-directory: packages/sourcemap-uploader
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-tier-2:
    name: 'Tier 2: Node + React'
    needs: [build, publish-tier-1]
    if: inputs.tier == '2' || inputs.tier == 'all'
    runs-on: [self-hosted, Linux, holdfast]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: Set versions
        run: |
          for pkg in sdk/highlight-node sdk/highlight-react; do
            node -e "const f='$pkg/package.json'; const p=JSON.parse(require('fs').readFileSync(f)); p.version='${{ inputs.version }}'; require('fs').writeFileSync(f, JSON.stringify(p, null, '\t')+'\n')"
          done

      - name: Publish @holdfast-io/node
        working-directory: sdk/highlight-node
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/react
        working-directory: sdk/highlight-react
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-tier-3:
    name: 'Tier 3: Framework integrations'
    needs: [build, publish-tier-2]
    if: inputs.tier == '3' || inputs.tier == 'all'
    runs-on: [self-hosted, Linux, holdfast]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: Set versions
        run: |
          for pkg in sdk/highlight-apollo sdk/highlight-hono sdk/highlight-nest sdk/highlight-remix sdk/pino; do
            node -e "const f='$pkg/package.json'; const p=JSON.parse(require('fs').readFileSync(f)); p.version='${{ inputs.version }}'; require('fs').writeFileSync(f, JSON.stringify(p, null, '\t')+'\n')"
          done

      - name: Publish @holdfast-io/apollo
        working-directory: sdk/highlight-apollo
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/hono
        working-directory: sdk/highlight-hono
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/nest
        working-directory: sdk/highlight-nest
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/pino
        working-directory: sdk/pino
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holdfast-io/remix
        working-directory: sdk/highlight-remix
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-tier-4:
    name: 'Tier 4: Next.js'
    needs: [build, publish-tier-3]
    if: inputs.tier == '4' || inputs.tier == 'all'
    runs-on: [self-hosted, Linux, holdfast]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: Set version
        run: node -e "const f='sdk/highlight-next/package.json'; const p=JSON.parse(require('fs').readFileSync(f)); p.version='${{ inputs.version }}'; require('fs').writeFileSync(f, JSON.stringify(p, null, '\t')+'\n')"

      - name: Publish @holdfast-io/next
        working-directory: sdk/highlight-next
        run: npm publish ${{ inputs.dry-run == true && '--dry-run' || '' }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
