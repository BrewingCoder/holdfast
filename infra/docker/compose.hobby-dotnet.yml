# HoldFast .NET backend — hobby (all-in-one) deployment.
# Usage: docker compose -f compose.yml -f compose.hobby-dotnet.yml up
services:
    backend:
        container_name: backend
        build:
            context: ../..
            dockerfile: infra/docker/backend-dotnet.Dockerfile
        image: ${BACKEND_DOTNET_IMAGE_NAME-holdfast-backend-dotnet:latest}
        restart: on-failure
        ports:
            - '0.0.0.0:8082:8082'
        volumes:
            - highlight-data:/highlight-data
        environment:
            - HOLDFAST_RUNTIME=all
            - ConnectionStrings__PostgreSQL=Host=${PSQL_DOCKER_HOST:-postgres};Port=${PSQL_PORT:-5432};Database=${PSQL_DB:-postgres};Username=${PSQL_USER:-postgres};Password=${PSQL_PASSWORD:-}
            - ClickHouse__Address=${CLICKHOUSE_ADDRESS:-clickhouse:8123}
            - ClickHouse__Database=${CLICKHOUSE_DATABASE:-default}
            - ClickHouse__Username=${CLICKHOUSE_USERNAME:-default}
            - ClickHouse__Password=${CLICKHOUSE_PASSWORD:-}
            - Redis__Configuration=${REDIS_ADDRESS:-redis:6379}
            - Kafka__BootstrapServers=${KAFKA_SERVERS:-kafka:9092}
            - Storage__Type=filesystem
            - Storage__FilesystemRoot=/highlight-data
            - Frontend__Uri=${REACT_APP_FRONTEND_URI:-http://localhost:3000}
            - Auth__Mode=${REACT_APP_AUTH_MODE:-Password}
            - Auth__AdminPassword=${ADMIN_PASSWORD:-}
            - DevSeed__Enabled=${DEV_SEED_ENABLED:-false}
            - DevSeed__AdminEmail=${DEV_SEED_ADMIN_EMAIL:-dev@holdfast.local}
            - DevSeed__AdminName=${DEV_SEED_ADMIN_NAME:-Dev Admin}
            - OTEL_EXPORTER_OTLP_ENDPOINT=http://backend:8082
        env_file: .env
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8082/health']
            interval: 15s
            timeout: 5s
            retries: 10

    collector:
        container_name: collector
        build:
            context: ../..
            dockerfile: infra/docker/collector.Dockerfile
            args:
                - IN_DOCKER_GO=true
                - SSL=false
        restart: on-failure
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '0.0.0.0:4317:4317'
            - '0.0.0.0:4318:4318'
            - '0.0.0.0:4319:4319'
        depends_on:
            backend:
                condition: service_healthy

    frontend:
        container_name: frontend
        build:
            context: ../..
            dockerfile: infra/docker/frontend.Dockerfile
        image: ${FRONTEND_IMAGE_NAME:-holdfast-frontend:latest}
        restart: on-failure
        ports:
            - '0.0.0.0:3000:3000'
            - '0.0.0.0:8080:8080'
        environment:
            - SSL=false
            - REACT_APP_AUTH_MODE=${REACT_APP_AUTH_MODE:-Password}
            - REACT_APP_FRONTEND_URI=${REACT_APP_FRONTEND_URI:-http://localhost:3000}
            - REACT_APP_PRIVATE_GRAPH_URI=${REACT_APP_PRIVATE_GRAPH_URI:-http://localhost:8082/private}
            - REACT_APP_PUBLIC_GRAPH_URI=${REACT_APP_PUBLIC_GRAPH_URI:-http://localhost:8082/public}
            - REACT_APP_OTLP_ENDPOINT=${REACT_APP_OTLP_ENDPOINT:-http://localhost:4318}

volumes:
    highlight-data:
