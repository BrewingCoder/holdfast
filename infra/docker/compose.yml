x-local-logging: &local-logging
    driver: local

# HoldFast services for the development deployment.
services:
    zookeeper:
        logging: *local-logging
        image: ${ZOOKEEPER_IMAGE_NAME}
        container_name: zookeeper
        restart: on-failure
        volumes:
            - zoo-data:/var/lib/zookeeper/data
            - zoo-log:/var/lib/zookeeper/log
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000

    kafka:
        logging: *local-logging
        image: ${KAFKA_IMAGE_NAME}
        container_name: kafka
        volumes:
            - kafka-data:/var/lib/kafka/data
        ports:
            - '0.0.0.0:9092:9092'
        restart: on-failure
        depends_on:
            - zookeeper
        environment:
            KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
            KAFKA_BROKER_ID: 1
            KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES: 268435456
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
            KAFKA_LOG_RETENTION_HOURS: 1
            KAFKA_LOG_SEGMENT_BYTES: 268435456
            KAFKA_MESSAGE_MAX_BYTES: 268435456
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_PRODUCER_MAX_REQUEST_SIZE: 268435456
            KAFKA_REPLICA_FETCH_MAX_BYTES: 268435456
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'

    redis:
        logging: *local-logging
        container_name: redis
        image: ${REDIS_IMAGE_NAME}
        restart: on-failure
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD}
        volumes:
            - redis-data:/data
        ports:
            - '0.0.0.0:6379:6379'
        command:
            - redis-server
            - --save 60 1
            - --loglevel warning

    postgres:
        logging: *local-logging
        container_name: postgres
        # a postgres image with pgvector installed
        image: ${POSTGRES_IMAGE_NAME}
        restart: on-failure
        ports:
            - '0.0.0.0:5432:5432'
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ../../tools/scripts/migrations/init.sql:/root/init.sql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 5

    clickhouse:
        logging: *local-logging
        container_name: clickhouse
        image: ${CLICKHOUSE_IMAGE_NAME}
        restart: on-failure
        ports:
            - '0.0.0.0:8123:8123'
            - '0.0.0.0:9000:9000'
        volumes:
            - ./config.xml:/etc/clickhouse-server/config.d/highlight.xml
            - ./users.xml:/etc/clickhouse-server/users.d/highlight.xml
            - clickhouse-data:/var/lib/clickhouse
            - clickhouse-logs:/var/log/clickhouse-server

    # Collector removed in HOL-21. The backend has a full OTLP HTTP receiver
    # at /otel/v1/{logs,traces,metrics} (JSON + protobuf, gzip + snappy
    # decompression). Self-hosted deployments don't need the SaaS-shaped
    # multi-protocol relay (fluentforward, syslog, AWS Firehose, etc).
    # Point SDKs at http://<host>:8082/otel instead of http://<host>:4318.

volumes:
    postgres-data:
    clickhouse-data:
    clickhouse-logs:
    redis-data:
    kafka-data:
    zoo-log:
    zoo-data:
