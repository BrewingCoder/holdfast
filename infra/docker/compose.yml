x-local-logging: &local-logging
    driver: local

# HoldFast services for the development deployment.
services:
    # Kafka + Zookeeper removed in HOL-23 — backend uses an in-process
    # Channel-backed message bus (HoldFast.Shared.Messaging.InProcessMessageBus).
    # Producers and consumers live in the same .NET host (all-in-one runtime
    # mode), so no broker is required at hobby/lean self-hosted scale.

    # Redis removed in HOL-22 — RedisService was registered in DI but no
    # code path actually injected it. Self-hosted scale doesn't need a
    # separate cache layer; .NET's IMemoryCache + Postgres cover it.

    postgres:
        logging: *local-logging
        container_name: postgres
        # a postgres image with pgvector installed
        image: ${POSTGRES_IMAGE_NAME}
        restart: on-failure
        ports:
            - '0.0.0.0:5432:5432'
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ../../tools/scripts/migrations/init.sql:/root/init.sql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 5

    clickhouse:
        logging: *local-logging
        container_name: clickhouse
        image: ${CLICKHOUSE_IMAGE_NAME}
        restart: on-failure
        ports:
            - '0.0.0.0:8123:8123'
            - '0.0.0.0:9000:9000'
        volumes:
            - ./config.xml:/etc/clickhouse-server/config.d/highlight.xml
            - ./users.xml:/etc/clickhouse-server/users.d/highlight.xml
            - clickhouse-data:/var/lib/clickhouse
            - clickhouse-logs:/var/log/clickhouse-server

    # Collector removed in HOL-21. The backend has a full OTLP HTTP receiver
    # at /otel/v1/{logs,traces,metrics} (JSON + protobuf, gzip + snappy
    # decompression). Self-hosted deployments don't need the SaaS-shaped
    # multi-protocol relay (fluentforward, syslog, AWS Firehose, etc).
    # Point SDKs at http://<host>:8082/otel instead of http://<host>:4318.

volumes:
    postgres-data:
    clickhouse-data:
    clickhouse-logs:
